name: 경제 유튜브 대시보드 갱신

# 평일(월~금) KST 06~22시 2시간마다 실행. cron 은 UTC 기준이라 KST 날짜 경계를 넘어
# 두 줄로 분할: (A) KST 10~22 = UTC 01~13 (월~금), (B) KST 06,08 = UTC 21,23 (일~목).
on:
  schedule:
    - cron: "0 1,3,5,7,9,11,13 * * 1-5"  # KST 평일 10·12·14·16·18·20·22시
    - cron: "0 21,23 * * 0-4"            # KST 평일 06·08시
  workflow_dispatch:                     # 수동 실행 버튼
    inputs:
      run_whisper:
        description: "자막 없는 영상 Whisper 전사 수행"
        type: boolean
        default: false

permissions:
  contents: write           # public/index.html 커밋·푸시용

concurrency:
  group: dashboard-update   # 실행 겹침 방지
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: 의존성 설치
        run: |
          pip install -r requirements.txt
          # Whisper 사용할 때만 ffmpeg 필요
          if [ "${{ github.event.inputs.run_whisper }}" = "true" ]; then
            sudo apt-get update && sudo apt-get install -y ffmpeg
          fi

      # 같은 날 이전 실행의 분석 결과 복원 → 증분 분석(비용 절감)
      - name: 데이터 캐시 복원
        uses: actions/cache/restore@v4
        with:
          path: data
          key: data-${{ github.run_id }}
          restore-keys: |
            data-

      - name: 쿠키 파일 준비 (YouTube 봇 차단 우회, 있으면)
        env:
          YT_COOKIES: ${{ secrets.YT_COOKIES }}
        run: |
          if [ -n "$YT_COOKIES" ]; then
            printf '%s' "$YT_COOKIES" > cookies.txt
            echo "YT_COOKIES_FILE=cookies.txt" >> "$GITHUB_ENV"
            echo "쿠키 파일 생성됨 ($(wc -l < cookies.txt) 줄)"
          else
            echo "YT_COOKIES 시크릿 없음 - 쿠키 없이 진행(클라우드에서 영상 수집 차단될 수 있음)"
          fi

      - name: 파이프라인 실행
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ "${{ github.event.inputs.run_whisper }}" = "true" ]; then
            python -m src.pipeline
          else
            python -m src.pipeline --skip-whisper
          fi

      - name: 데이터 캐시 저장
        if: always()
        uses: actions/cache/save@v4
        with:
          path: data
          key: data-${{ github.run_id }}

      - name: 결과 페이지 커밋·푸시 (Vercel 재배포 트리거)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/index.html
          if git diff --cached --quiet; then
            echo "변경 없음 - 푸시 생략"
          else
            git commit -m "auto: 대시보드 갱신 $(TZ=Asia/Seoul date '+%Y-%m-%d %H:%M KST')"
            git push
          fi
